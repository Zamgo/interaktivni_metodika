name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "site/package-lock.json"

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build all tenants
        working-directory: site
        env:
          PAGES_BASE: ${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          # Přidejte další firmu = přidejte její id sem (musí existovat v tenants.ts).
          for tenant in rsd sz; do
            echo "::group::Build tenant $tenant"
            QUARTZ_TENANT="$tenant" \
            QUARTZ_BASE_URL="$PAGES_BASE/$tenant" \
            node ./quartz/bootstrap-cli.mjs build -d .. -o "public/$tenant"
            echo "::endgroup::"
          done

      - name: Add root landing page
        run: cp site/root/index.html site/public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

